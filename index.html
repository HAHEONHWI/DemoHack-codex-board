<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Board</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img src="./supabase/assets/brand.svg" alt="" class="brand-image" />
          <div>
            <strong>Post Board</strong>
            <span>Supabase 게시판</span>
          </div>
        </div>

        <nav class="nav" aria-label="주요 메뉴">
          <button class="nav-item active" data-view="posts">
            <i data-lucide="newspaper"></i>
            게시글
          </button>
          <button class="nav-item" data-view="editor">
            <i data-lucide="square-pen"></i>
            글쓰기
          </button>
          <button class="nav-item admin-only" data-view="admin">
            <i data-lucide="shield-check"></i>
            계정 관리
          </button>
        </nav>

        <div class="session-card">
          <div>
            <span class="eyebrow">현재 계정</span>
            <strong id="sessionEmail">로그인이 필요합니다</strong>
            <span id="sessionRole">guest</span>
          </div>
          <button id="logoutButton" class="icon-button" title="로그아웃" hidden>
            <i data-lucide="log-out"></i>
          </button>
        </div>
      </aside>

      <main class="main">
        <section id="authView" class="auth-layout">
          <div class="auth-copy">
            <span class="eyebrow">Secure writing space</span>
            <h1>계정 권한이 분리된 기본 게시판</h1>
            <p>일반 사용자는 본인 글만 관리하고, 관리자는 사용자 계정을 생성하거나 삭제할 수 있습니다.</p>
          </div>

          <form id="authForm" class="auth-panel">
            <div class="segmented" role="tablist" aria-label="인증 모드">
              <button type="button" class="active" data-auth-mode="login">로그인</button>
              <button type="button" data-auth-mode="signup">회원가입</button>
            </div>
            <label>
              이메일
              <input id="authEmail" type="email" autocomplete="email" required />
            </label>
            <label>
              비밀번호
              <input id="authPassword" type="password" autocomplete="current-password" minlength="6" required />
            </label>
            <button class="primary-button" type="submit">
              <i data-lucide="arrow-right"></i>
              <span id="authSubmitLabel">로그인</span>
            </button>
            <p id="authMessage" class="form-message" role="status"></p>
          </form>
        </section>

        <section id="appView" hidden>
          <header class="topbar">
            <div>
              <span class="eyebrow">게시판</span>
              <h1 id="viewTitle">게시글</h1>
            </div>
            <button id="refreshButton" class="secondary-button">
              <i data-lucide="refresh-cw"></i>
              새로고침
            </button>
          </header>

          <section id="postsView" class="view active">
            <div id="postsList" class="posts-list" aria-live="polite"></div>
          </section>

          <section id="editorView" class="view">
            <form id="postForm" class="panel editor-panel">
              <input type="hidden" id="postId" />
              <label>
                제목
                <input id="postTitle" type="text" maxlength="120" required />
              </label>
              <label>
                내용
                <textarea id="postContent" rows="12" required></textarea>
              </label>
              <div class="button-row">
                <button type="submit" class="primary-button">
                  <i data-lucide="save"></i>
                  <span id="postSubmitLabel">게시</span>
                </button>
                <button type="button" id="cancelEditButton" class="secondary-button" hidden>
                  <i data-lucide="x"></i>
                  취소
                </button>
              </div>
              <p id="postMessage" class="form-message" role="status"></p>
            </form>
          </section>

          <section id="adminView" class="view">
            <div class="admin-grid">
              <form id="adminCreateForm" class="panel">
                <h2>계정 생성</h2>
                <label>
                  이메일
                  <input id="adminEmail" type="email" required />
                </label>
                <label>
                  임시 비밀번호
                  <input id="adminPassword" type="password" minlength="6" required />
                </label>
                <label>
                  역할
                  <select id="adminRole">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                  </select>
                </label>
                <button type="submit" class="primary-button">
                  <i data-lucide="user-plus"></i>
                  계정 생성
                </button>
                <p id="adminMessage" class="form-message" role="status"></p>
              </form>

              <div class="panel">
                <div class="panel-heading">
                  <h2>계정 목록</h2>
                  <button id="loadProfilesButton" class="icon-button" title="계정 목록 새로고침">
                    <i data-lucide="rotate-cw"></i>
                  </button>
                </div>
                <div id="profilesList" class="profiles-list"></div>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
